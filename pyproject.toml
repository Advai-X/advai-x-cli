[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "advai"
version = "1.0.0"
description = "跨平台 AI Skill 管理器 — 一键 install / uninstall / list / update"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [{ name = "advai" }]
dependencies = [
    "click>=8.1",
]

[project.scripts]
advai = "advai.cli:cli"

[project.urls]
Homepage = "https://github.com/Advai-X/advai-x-cli"
Issues = "https://github.com/Advai-X/advai-x-cli/issues"

[tool.setuptools]
packages = ["advai"]
